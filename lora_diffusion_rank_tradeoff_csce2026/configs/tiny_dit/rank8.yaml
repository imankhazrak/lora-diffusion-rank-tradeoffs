rank: 8
alpha: 8
dropout: 0.0

lora:
  rank: 8
  alpha: 8
  dropout: 0.0
  target_modules:
    - to_q
    - to_k
    - to_v
    - to_out.0

tiny_dit:
  in_channels: 3
  out_channels: 3
  num_layers: 4
  num_attention_heads: 4
  attention_head_dim: 32
  norm_num_groups: 1
  norm_type: layer_norm

dataset: cifar10
resolution: 32
batch_size: 64
epochs: 10
learning_rate: 1e-4
mixed_precision: auto
seed: 42

output_dir: outputs/tiny_dit/rank8
